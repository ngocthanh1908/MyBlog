services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: myblog-app
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SITE_URL=http://103.98.160.56
    networks:
      - myblog-net

  nginx:
    image: nginx:alpine
    container_name: myblog-nginx
    restart: unless-stopped
    ports:
      - "8001:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - myblog-net

networks:
  myblog-net:
    driver: bridge
